development:
  update_stocks:
    class: UpdateStocksJob
    schedule: every 4 hours at minute 0
  update_funds:
    class: UpdateFundsJob
    schedule: every 4 hours at minute 3
  update_ofz:
    class: UpdateOfzJob
    schedule: every 4 hours at minute 6
  update_corporate_bonds:
    class: UpdateCorporateBondsJob
    schedule: every 4 hours at minute 9
  update_currencies:
    class: UpdateCurrenciesJob
    schedule: every 4 hours at minute 12

production:
  update_stocks:
    class: UpdateStocksJob
    schedule: every 4 hours at minute 0
  update_funds:
    class: UpdateFundsJob
    schedule: every 4 hours at minute 3
  update_ofz:
    class: UpdateOfzJob
    schedule: every 4 hours at minute 6
  update_corporate_bonds:
    class: UpdateCorporateBondsJob
    schedule: every 4 hours at minute 9
  update_currencies:
    class: UpdateCurrenciesJob
    schedule: every 4 hours at minute 12
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
